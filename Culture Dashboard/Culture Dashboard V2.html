<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABLBL Culture Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    /* New Branded Palette based on ABLBL Logo */
    --brand-red: #8B181B;        /* Primary rich red/maroon */
    --brand-red-dark: #5A0C0E;   /* Deep red for background gradients */
    --brand-gold: #CBA153;       /* Logo gold */
    --brand-gold-light: #F4E8D1; /* Soft gold for hover states */
    --bg-cream: #FFFBEE;         /* Replaces pure white for cards */
    --bg-warm: #FFF2D4;          /* Slightly deeper yellow/cream for contrast */
    --text-dark-red: #4A0A0C;    /* Very dark red for main text (softer than black) */
    --text-muted: #8B4A4C;       /* Muted red for secondary text */
    --border-color: #E8D5A5;     /* Gold-tinted borders */
  }

  body {
    font-family: 'Inter', sans-serif;
    /* Rich maroon background for the whole page */
    background: linear-gradient(135deg, var(--brand-red-dark), var(--brand-red));
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    color: var(--text-dark-red);
    min-height: 100vh;
    box-sizing: border-box;
  }

  .ablbl-dashboard {
    max-width: 1100px;
    width: 100%;
    background: var(--bg-cream);
    border-radius: 20px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); /* Stronger shadow for depth against dark bg */
    overflow: hidden;
  }

  /* Header Section */
  .dash-header {
    background: var(--bg-cream);
    padding: 25px 40px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid var(--brand-gold);
  }

  .dash-logo {
    display: flex;
    align-items: center;
    gap: 15px;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--brand-red);
    letter-spacing: 0.5px;
  }

  .dash-logo img {
    height: 60px;
    width: auto;
    /* This trick removes the white background from your JPEG! */
    mix-blend-mode: multiply; 
  }

  /* Main Layout */
  .dash-body {
    display: flex;
    flex-direction: row;
  }

  /* Video & Nuance Section */
  .video-container {
    flex: 1.5;
    padding: 40px;
    background-color: var(--bg-warm);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .mascot-wrapper {
    position: relative;
    width: 100%;
    max-width: 500px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(139, 24, 27, 0.2); /* Red-tinted shadow */
    background: #fff;
    border: 2px solid var(--brand-gold);
  }

  .mascot-wrapper video {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.4s ease;
  }

  .value-title {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(90, 12, 14, 0.9), transparent);
    color: #ffffff;
    padding: 30px 20px 15px 20px;
    font-size: 1.1rem;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* Nuance Box */
  .nuance-box {
    margin-top: 25px;
    max-width: 500px;
    width: 100%;
    background: var(--brand-gold-light);
    border-left: 5px solid var(--brand-red);
    padding: 18px 25px;
    border-radius: 0 8px 8px 0;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    color: var(--text-dark-red);
    font-size: 0.95rem;
    line-height: 1.6;
    transition: opacity 0.3s ease;
  }

  .nuance-box strong {
    color: var(--brand-red);
    display: block;
    margin-bottom: 5px;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }

  /* Menu Section */
  .menu-container {
    flex: 1;
    padding: 40px 30px;
    background: var(--bg-cream);
    border-left: 1px solid var(--border-color);
  }

  .menu-title {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: 25px;
  }

  .cmd-btn {
    display: flex;
    align-items: center;
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    margin-bottom: 12px;
    background: var(--bg-cream);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--brand-red);
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
    line-height: 1.4;
  }

  .cmd-btn:hover {
    background: var(--brand-gold-light);
    border-color: var(--brand-gold);
    transform: translateY(-2px);
  }

  .cmd-btn.active {
    background: var(--brand-red);
    color: var(--bg-cream);
    border-color: var(--brand-red);
    box-shadow: 0 6px 15px rgba(139, 24, 27, 0.3);
  }

  .cmd-number {
    font-size: 0.8rem;
    opacity: 0.8;
    margin-right: 15px;
    font-weight: 800;
    color: var(--brand-gold);
    flex-shrink: 0;
  }

  /* Active state number color */
  .cmd-btn.active .cmd-number {
    color: var(--brand-gold-light);
    opacity: 1;
  }

  /* Responsive */
  @media (max-width: 850px) {
    .dash-body {
      flex-direction: column;
    }
    .menu-container {
      border-left: none;
      border-top: 1px solid var(--border-color);
    }
  }
</style>
</head>
<body>

<div class="ablbl-dashboard">
  
  <div class="dash-header">
    <div class="dash-logo">
      <img src="ABFRL-Logo-1000x980-1.jpg" alt="ABLBL Logo">
      ABLBL Culture Dashboard
    </div>
  </div>

  <div class="dash-body">
    <div class="video-container">
      <div class="mascot-wrapper">
        <video id="mascot-player" poster="Untitled design (12).png" autoplay loop muted playsinline>
          <source id="video-source" src="integrity-anim.mp4" type="video/mp4">
        </video>
        <div id="value-title" class="value-title">I Lead with Integrity. Always.</div>
      </div>
      
      <div class="nuance-box">
        <strong>Culture Insight</strong>
        <span id="nuance-text">The bedrock of ABLBL. Integrity is an unambiguous cultural fact and our most validated core strength, serving as the foundation for everything we do.</span>
      </div>
    </div>

    <div class="menu-container">
      <div class="menu-title">Culture Commandments</div>
      
      <button class="cmd-btn active" onclick="updateDashboard(this, 'integrity-anim.mp4', 'I Lead with Integrity. Always.', 'The bedrock of ABLBL. Integrity is an unambiguous cultural fact and our most validated core strength, serving as the foundation for everything we do.')">
        <span class="cmd-number">01</span> I Lead with Integrity. Always.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'family-anim.mp4', 'We Are Family. Act Like It.', 'The family feeling is real, particularly in times of need. Our focus is on deliberately recreating this warmth at scale so every individual experiences this support.')">
        <span class="cmd-number">02</span> We Are Family. Act Like It.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'hire-heart-anim.mp4', 'Hire the Heart. Train the Skill.', 'We value intent and character. While skills can be taught, we prioritize aligning our hiring and career decisions with our core cultural values.')">
        <span class="cmd-number">03</span> Hire the Heart. Train the Skill.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'open-doors-anim.mp4', 'Open Doors, Open Minds.', 'Leadership is directly accessible. This flat, approachable culture is a genuine, competitive strength that empowers open communication at all levels.')">
        <span class="cmd-number">04</span> Open Doors, Open Minds.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'speak-up-anim.mp4', 'Ownership Begins with Your Voice.', 'Psychological safety is key. We cultivate an environment where individuals feel safe to speak up, share ideas, and even say \'I don’t know\'.')">
        <span class="cmd-number">05</span> Ownership Begins with Your Voice.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'one-identity-anim.mp4', 'One ABLBL. Many Brands. One Culture.', 'Transcending brand boundaries. We are building a collective ABLBL identity through shared rituals, stories, and unified celebrations.')">
        <span class="cmd-number">06</span> One ABLBL. Many Brands. One Culture.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'empathy-anim.mp4', 'Lead with Empathy. Manage with Courage.', 'Balancing compassion with accountability. We strive to bring empathy into daily management while fostering the courage needed for honest feedback.')">
        <span class="cmd-number">07</span> Lead with Empathy. Manage with Courage.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'commit-anim.mp4', 'Commit Deeply. Show Up Fully.', 'A culture of deep commitment. We are dedicated to follow-through, reliability, and establishing formal rituals that ensure continuous loop closure.')">
        <span class="cmd-number">08</span> Commit Deeply. Show Up Fully.
      </button>
      
      <button class="cmd-btn" onclick="updateDashboard(this, 'stay-hungry-anim.mp4', 'Stay Hungry. Stay Learning.', 'A resilient learning culture. We are driven to make learning and growth opportunities universally accessible across all functions and roles.')">
        <span class="cmd-number">09</span> Stay Hungry. Stay Learning.
      </button>

    </div>
  </div>
</div>

<script>
  function updateDashboard(buttonElement, videoFile, valueHeading, nuanceText) {
    const buttons = document.querySelectorAll('.cmd-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    const videoPlayer = document.getElementById('mascot-player');
    const videoSource = document.getElementById('video-source');
    const titleOverlay = document.getElementById('value-title');
    const nuanceDisplay = document.getElementById('nuance-text');
    const nuanceBox = document.querySelector('.nuance-box');
    
    videoPlayer.style.opacity = 0;
    titleOverlay.style.opacity = 0;
    nuanceBox.style.opacity = 0;
    
    setTimeout(() => {
      videoSource.src = videoFile;
      titleOverlay.innerText = valueHeading; 
      nuanceDisplay.innerText = nuanceText;

      videoPlayer.load();
      videoPlayer.play();
      
      videoPlayer.style.opacity = 1;
      titleOverlay.style.opacity = 1;
      nuanceBox.style.opacity = 1;
    }, 300); 
  }
</script>

</body>
</html>
